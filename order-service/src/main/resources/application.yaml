spring:
  application:
    name: order-service
  cloud:
    config:
      uri: http://localhost:8888
  config:
    import: configserver:http://localhost:8787
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    url: jdbc:postgresql://localhost:5439/order_db
    username: order_db
    password: order-password
    driver-class-name: org.postgresql.Driver
server:
  port: 8085
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
