server:
  port: 8082

spring:
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5437/user_db}
    username: ${USER_DB_USERNAME:user_db}
    password: ${USER_DB_PASSWORD:${DB_PASSWORD:user-password}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
